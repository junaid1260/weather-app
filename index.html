<!DOCTYPE html>
<html lang="en">
<head>

  <title>Weather App</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #1a1a2e;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

.container {
    background: #16213e;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

input {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    width: 70%;
    background: #0f3460;
    color: white;
    outline: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: #e94560;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-left: 8px;
    margin-top: 10px;
}

button:hover {
    background: #c73652;
}


#result h2 {
    font-size: 32px;
    margin: 20px 0 10px;
    color: #e94560;
}

#result p {
    font-size: 18px;
    margin: 8px 0;
    color: #a8b2d8;
}

</style>

</head>
<body>
 
<div class="container">
    <input type="text" id="cityInput" placeholder="City likho...">
    <button id="searchBtn">Search</button>
    <div id="result"></div>
</div>


<script src="script.js"></script>
</body>
</html>
